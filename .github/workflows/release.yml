name: Release

# Build and publish a GitHub Release whenever a version tag is pushed.
# Tag example: git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # required to create the release and upload assets

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build distributables
        run: npm run make

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Uses the pushed tag (e.g. v0.1.0) as the release name/tag.
          generate_release_notes: true
          files: |
            out/make/**/*.exe
            out/make/**/*.zip
            out/make/**/*.nupkg
            out/make/**/RELEASES
